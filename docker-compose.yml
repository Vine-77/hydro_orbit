version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: hydro-orbit-postgres
    environment:
      POSTGRES_USER: hydro_user
      POSTGRES_PASSWORD: hydro_password
      POSTGRES_DB: hydro_orbit
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hydro_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: hydro-orbit-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: hydro-orbit-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infrastructure/mosquitto.conf:/mosquitto/config/mosquitto.conf
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: hydro-orbit-api
    environment:
      DATABASE_URL: postgresql://hydro_user:hydro_password@postgres:5432/hydro_orbit
      REDIS_URL: redis://redis:6379
      MQTT_BROKER: mqtt://mosquitto:1883
      JWT_SECRET: your-secret-key-change-in-production
      PORT: 3000
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy

  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: hydro-orbit-ai
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:

networks:
  default:
    name: hydro-orbit-network
